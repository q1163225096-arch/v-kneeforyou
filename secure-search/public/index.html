<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>资料搜索</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="login-panel" id="loginPanel">
        <h1>资料搜索</h1>
        <form id="loginForm" class="login-form">
          <input id="passwordInput" type="password" placeholder="访问密码" autocomplete="current-password" />
          <button type="submit">进入</button>
        </form>
        <p class="hint" id="loginHint">输入密码后才能查看和搜索。</p>
      </section>

      <section class="file-panel is-hidden" id="appPanel">
        <form class="search-form" id="searchForm">
          <div class="search-control">
            <button class="filter-toggle" id="filterToggle" type="button" title="筛选" aria-label="筛选">▽</button>
            <input id="searchInput" type="search" placeholder="搜索文件" autocomplete="off" />
            <button class="search-button" type="submit">搜索</button>
          </div>
        </form>

        <div class="filters is-hidden" id="filters">
          <div class="radio-group">
            <button class="radio-button is-active" type="button" data-filter="type" data-value="all">全部类型</button>
            <button class="radio-button" type="button" data-filter="type" data-value="dir">仅文件夹</button>
            <button class="radio-button" type="button" data-filter="type" data-value="file">仅文件</button>
          </div>
          <div class="radio-group">
            <button class="radio-button is-active" type="button" data-filter="scope" data-value="global">全盘搜索</button>
            <button class="radio-button" type="button" data-filter="scope" data-value="current">当前目录</button>
          </div>
        </div>

        <nav class="breadcrumb is-hidden" id="breadcrumb"></nav>
        <div class="list-shell">
          <div class="empty-state is-hidden" id="emptyState">暂无数据</div>
          <div class="file-list" id="fileList"></div>
        </div>
      </section>

      <div class="toast" id="toast"></div>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
