<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>已购免费未购看链接</title>
    <link rel="stylesheet" href="./styles.css?v=20260617-11" />
  </head>
  <body>
    <div class="page">
      <main class="layout-box">
        <div class="server-banner is-hidden" id="serverBanner">
          当前为离线预览，深层目录需要本地服务。
          <a href="http://127.0.0.1:8765/">打开完整可点击版本</a>
        </div>

        <section class="file-panel" aria-label="文件目录">
          <form class="search-form" id="searchForm">
            <div class="search-control">
              <button class="filter-toggle" id="filterToggle" type="button" title="筛选" aria-label="筛选">
                <svg viewBox="64 64 896 896" aria-hidden="true">
                  <path d="M880.1 154H143.9c-24.5 0-39.8 26.7-27.5 48L349 597.4V838c0 17.7 14.2 32 31.8 32h262.4c17.6 0 31.8-14.3 31.8-32V597.4L907.7 202c12.2-21.3-3.1-48-27.6-48zM603.4 798H420.6V642h182.9v156zm9.6-236.6l-9.5 16.6h-183l-9.5-16.6L212.7 226h598.6L613 561.4z" />
                </svg>
              </button>
              <input id="searchInput" type="search" placeholder="搜索文件" autocomplete="off" />
              <button class="search-button" type="submit">搜索</button>
            </div>
          </form>

          <div class="filters is-hidden" id="filters">
            <div class="radio-group" role="radiogroup" aria-label="文件类型">
              <button class="radio-button is-active" type="button" data-filter="type" data-value="all">全部类型</button>
              <button class="radio-button" type="button" data-filter="type" data-value="dir">仅文件夹</button>
              <button class="radio-button" type="button" data-filter="type" data-value="file">仅文件</button>
            </div>
            <div class="radio-group" role="radiogroup" aria-label="搜索范围">
              <button class="radio-button is-active" type="button" data-filter="scope" data-value="global">全盘搜索</button>
              <button class="radio-button" type="button" data-filter="scope" data-value="current">当前目录</button>
            </div>
          </div>

          <nav class="breadcrumb is-hidden" id="breadcrumb" aria-label="面包屑"></nav>

          <div class="list-shell" id="listShell">
            <div class="empty-state is-hidden" id="emptyState">暂无数据</div>
            <div class="file-list" id="fileList"></div>
          </div>
        </section>

      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./data/bootstrap-data.js?v=20260619-bootstrap"></script>
    <script src="./script.js?v=20260619-dirlabel"></script>
  </body>
</html>
